# =============================================================================
# RepurposeAI — Local Development Stack
# =============================================================================
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d app          # Start only the app
#   docker compose logs -f            # Follow logs
#   docker compose down               # Stop all services
#
# Environment file: .env.local is loaded automatically.
# Override APP_PORT to change the host port (default: 3000).
#
# =============================================================================

services:
  # --- Application -----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}"
    container_name: repurpose-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - ENABLE_MIGRATIONS=true
      - DATABASE_URL=postgresql://repurpose:repurpose@postgres:5432/repurpose?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - repurpose-network

  # --- PostgreSQL ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: repurpose-postgres
    restart: unless-stopped
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: repurpose
      POSTGRES_PASSWORD: repurpose
      POSTGRES_DB: repurpose
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repurpose"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - repurpose-network

  # --- Redis -----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: repurpose-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - repurpose-network

  # --- Mailpit (Email testing) -----------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: repurpose-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - repurpose-network

  # --- MinIO (S3-compatible storage, optional) --------------------------------
  minio:
    image: minio/minio:latest
    container_name: repurpose-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - repurpose-network
    profiles:
      - full

networks:
  repurpose-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
